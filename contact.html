<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Agridera</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <header class="header white-header">
        <div class="container header-container">
            <div class="logo">
                <img src="img/Logo.png" alt="Agridera Logo" height="50">
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="Search">
                    <span class="search-icon">🔍</span>
                </div>
                <nav class="nav">
                    <a href="index.html">Home</a>
                    <a href="tomato_all.html">Company Profile</a>
                    <a href="tomato_detail.html">Products</a>
                    <a href="#">Services</a>
                    <a href="#">R & D</a>
                    <a href="contact.html">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="top-banner-img">
        <img src="img/bg2.jpg" alt="Agridera Fields">
    </div>

    <main class="contact-section">
        <div class="container">
            <h1 class="contact-title">Contact us</h1>
            <div class="contact-divider">*****</div>

            <form action="#" class="contact-form">
                <div class="form-col">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>Telephone</label>
                        <input type="tel">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" required>
                    </div>
                </div>

                <div class="form-col">
                    <div class="form-group">
                        <label>You are a</label>
                        <select>
                            <option value="seed-producer">seed producer</option>
                            <option value="farmer">farmer</option>
                            <option value="distributor">distributor</option>
                            <option value="other">other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>If other, please specify</label>
                        <input type="text">
                    </div>
                    <div class="form-group textarea-group">
                        <label>You are interested in</label>
                        <textarea></textarea>
                    </div>
                    <div class="form-group captcha-group">
                        <label>Please type this code</label>
                        <div class="captcha-row">
                            <span class="captcha-code">7 C J 3</span>
                            <input type="text" class="captcha-input" required>
                            <button type="submit" class="btn-submit">Send Message</button>
                        </div>
                    </div>
                </div>
            </form>

            <div class="address-section">
                <div class="address-title">Our Address</div>
                <div class="address-details">
                    <p>AGRIDERA Seeds & Agriculture Ltd.</p>
                    <p>P.O Box 103,</p>
                    <p>Gedera 70750, Israel.</p>
                    <p>Telephone: <span class="phone-number">+972 8 944 9222</span></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <nav class="footer-nav">
                <a href="#">PROFILE</a>
                <a href="#">MANAGEMENT</a>
                <a href="#">PRODUCTS</a>
                <a href="#">R&D</a>
                <a href="#">LINKS</a>
                <a href="#">SITEMAP</a>
                <a href="contact.html">CONTACT</a>
            </nav>
            <div class="socials">
                <a href="#" class="soc-icon"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="soc-icon"><i class="bi bi-instagram"></i></a>
                <a href="#" class="soc-icon"><i class="bi bi-youtube"></i></a>
                <a href="#" class="soc-icon"><i class="bi bi-twitter"></i></a>
                <a href="#" class="soc-icon"><i class="bi bi-facebook"></i></a>
            </div>
        </div>
        <div class="copy">AGRIDERA SEEDS & AGRICULTURE LTD. © 2020</div>
    </footer>

</body>
</html>
